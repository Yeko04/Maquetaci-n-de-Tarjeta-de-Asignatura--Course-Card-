<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maquetación de Tarjeta de Asignatura (Course Card)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <article class="course-card">
        <div class="course-header">
            <div class="placeholder-icon">
                <span>✉️</span>
            </div>
        </div>
        <div class="course-body">
            <h2 class="course-title">Programación Web</h2>
            <p class="course-teacher">Docente: Ing. Aaron Cisneros</p>

            <div class="badge-group">
                <span class="badge">ING-402</span>
                <span class="badge">Gpo1</span>
                <span class="badge">Aula E-201</span>
            </div>

            <a href="#" class="btn-primary">Ingresar al Aula Virtual</a>
        </div> 
    </article>
    

</body>
</html>
